# 퍼거슨 — 방법론 머지 결정 + 정비(git push). 모델 = gemini.
profile=ferguson

# 공유 방법론 스킬 + 퍼거슨 전용 정비 스킬(personas/ferguson/skills/ 에서 자동 포함)
skills=quant-analyst

model.provider=gemini
# model.default 는 `hermes -p ferguson model` 로 선택 (예: gemini-2.5-pro 계열)

display.busy_input_mode=interrupt
display.tool_progress=off
discord.auto_thread=false
discord.require_mention=true
# 퍼거슨은 방법론 SKILL.md 수정 + git/gh 필요 (curl 은 quant 보조지표용)
command_allowlist=git *,gh *,curl *,curl
display.cleanup_progress=true
approvals.destructive_slash_confirm=false
