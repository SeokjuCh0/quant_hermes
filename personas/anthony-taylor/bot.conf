# 앤서니 테일러 — 독립 분석으로 데드락 깨는 3번째 분석가(주심). 모델 = perplexity.
profile=anthony-taylor

# 공유 방법론 스킬
skills=quant-analyst

model.default=gemini-2.5-pro
model.provider=gemini
# model.default 는 `hermes -p anthony-taylor model` 로 선택 (예: sonar 계열)

display.busy_input_mode=interrupt
display.tool_progress=off
discord.auto_thread=false
# 앤서니 = 프론트도어. 사람 메시지를 멘션 없이 받는 유일한 봇.
discord.require_mention=false
# 앤서니는 hermes -p <봇> -z / send 로 다른 봇을 호출한다(curl 은 직접 quant 보조지표용).
# 단 HERMES_YOLO_MODE=1 이면 hermes 호출은 allowlist 없이도 통과한다(approval.py 943) — 아래는 관례상 명시.
command_allowlist=hermes *,hermes,curl *,curl
display.cleanup_progress=true
approvals.destructive_slash_confirm=false
