# 마갈량 봇 설정 — deploy.sh 가 읽어서 이 봇의 hermes 프로필에 적용한다.
#
# 'profile' = 특수키 (HERMES_HOME 결정: "default"=~/.hermes, 그 외=~/.hermes/profiles/<profile>).
# 나머지 key=value 는 전부 `hermes config set <key> <value>` 로 이 프로필에 적용된다.
# 'command_allowlist' 는 콤마 구분 리스트로 특수 처리(config set이 리스트를 문자열로 저장하는 이슈 회피).
# 값에 공백 OK (예: "curl *"). 키 주변 공백 금지.

profile=magalyang

# 가져올 공유 스킬 (repo skills/ 에서, 콤마 구분). 4봇 공유 = 퍼거슨이 여기 하나 고치면 전원 반영.
skills=quant-analyst

# 두뇌(모델) — 봇마다 다르게 두면 토론 다양성 ↑. 빠른 모델일수록 응답 빠름.
model.default=claude-sonnet-4-5
model.provider=anthropic

# 표시/동작
display.busy_input_mode=queue
display.tool_progress=none
discord.auto_thread=false
discord.require_mention=false

# 스킬이 yahoo chart API를 curl 로 호출하므로 허용 (콤마 리스트)
command_allowlist=curl *,curl
