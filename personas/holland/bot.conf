# 홀란 — 마갈량 저격수(비판자). 모델 = codex.
profile=holland

# 공유 방법론 스킬
skills=quant-analyst

# ⚠ codex = openai-codex (ChatGPT OAuth). "API만" 원하면 provider=openai + gpt 모델로 바꿔라.
